apiVersion: v1
kind: Secret
metadata:
  name: postiz-env
  labels:
    app: postiz
type: Opaque
stringData:
  DATABASE_URL: postgres://postiz:postizpassword@localhost:5432/postiz
  APP_URL: http://postiz.local:30000
  JWT_SECRET: "change-this-jwt-secret"
  ENCRYPTION_KEY: "change-this-encryption-key"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postiz-postgres-pvc
  labels:
    app: postiz
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz
  labels:
    app: postiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postiz
  template:
    metadata:
      labels:
        app: postiz
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: postiz
            - name: POSTGRES_USER
              value: postiz
            - name: POSTGRES_PASSWORD
              value: postizpassword
          volumeMounts:
            - name: postiz-postgres-data
              mountPath: /var/lib/postgresql/data
        - name: postiz
          image: ghcr.io/gitroomhq/postiz-app:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              until node -e "require('net').createConnection({host:'localhost',port:5432}).on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})" 2>/dev/null; do
                echo "waiting for postgres..."
                sleep 2
              done
              exec sh -c "nginx && pnpm run pm2"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-env
                  key: DATABASE_URL
            - name: APP_URL
              valueFrom:
                secretKeyRef:
                  name: postiz-env
                  key: APP_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postiz-env
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: postiz-env
                  key: ENCRYPTION_KEY
          ports:
            - containerPort: 5000
      volumes:
        - name: postiz-postgres-data
          persistentVolumeClaim:
            claimName: postiz-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postiz
  labels:
    app: postiz
spec:
  type: NodePort
  selector:
    app: postiz
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30000
